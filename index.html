<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resilient Chopper</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0f14;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Glassmorphic Canvas Container */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9.6; /* Matches 800x480 logical scale */
            background: rgba(20, 24, 33, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        /* Frosted Glass Overlay Screens */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 12, 18, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.25s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 24px;
            text-align: center;
            padding: 0 20px;
        }

        .btn {
            background: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%);
            border: none;
            color: #050508;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 240, 255, 0.3);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Smooth Mobile Action Pad Controls */
        .controls-ui {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
        }

        .action-btn {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .action-btn:active {
            background: rgba(0, 240, 255, 0.2);
            border-color: #00f0ff;
        }

        .action-btn svg {
            width: 32px;
            height: 32px;
            fill: #e2e8f0;
        }

        /* Show mobile UI only when a touch screen is active or layout requests it */
        @media (pointer: fine) {
            .controls-ui {
                display: none; /* Hide on regular desktop setups with mice */
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Canvas Viewport Layout -->
        <canvas id="gameCanvas" width="800" height="480"></canvas>

        <!-- Menu Screen Overlay -->
        <div id="menuOverlay" class="overlay">
            <h1>CHOPPER RUN</h1>
            <p>Press Spacebar, Up Arrow, or hold the screen Button to fly up.</p>
            <button class="btn" id="startBtn">START MISSION</button>
        </div>

        <!-- Game Over Screen Overlay -->
        <div id="gameOverOverlay" class="overlay hidden">
            <h1 style="color: #ff3e3e; text-shadow: 0 0 10px rgba(255,62,62,0.4);">MISSION FAILED</h1>
            <p id="scoreSummary">Score: 0 | Best: 0</p>
            <button class="btn" id="restartBtn">REDEPLOY</button>
        </div>

        <!-- Touch Controls UI Elements Layer -->
        <div class="controls-ui">
            <div class="action-btn" id="touchThrust">
                <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5H7z"/></svg>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Tracking Objects
        const menuOverlay = document.getElementById('menuOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const scoreSummary = document.getElementById('scoreSummary');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const touchThrust = document.getElementById('touchThrust');

        let isThrusting = false;
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        let score = 0;
        let highScore = 0;

        // Delta Time Tracking variables for variable monitor synchronization
        let lastTime = 0;

        // Engine Physics Parameter Values
        const chopper = {
            x: 120,
            y: 200,
            width: 48,
            height: 24,
            velocity: 0,
            gravity: 1400,    // Scaled per second units
            thrust: -1600,    // Scaled per second units
            maxFallSpeed: 500,
            rotorAngle: 0
        };

        let obstacles = [];
        const obstacleConfig = {
            width: 50,
            gap: 155,
            speed: 240,       // Distance units leftward per second
            spawnInterval: 1.8, // Seconds between structural pillars
            spawnTimer: 0
        };

        // Procedural Audio Engine Config (Web Audio API Subsystem Setup)
        let audioCtx = null;
        let engineOsc = null;
        let engineMod = null;
        let engineGain = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function startEngineAudio() {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            try {
                // Main low engine rumbling core
                engineOsc = audioCtx.createOscillator();
                engineOsc.type = 'sawtooth';
                engineOsc.frequency.setValueAtTime(22, audioCtx.currentTime);

                // Rotor chopping effect frequency modifier node
                engineMod = audioCtx.createOscillator();
                engineMod.type = 'sine';
                engineMod.frequency.setValueAtTime(11, audioCtx.currentTime); 

                const modGain = audioCtx.createGain();
                modGain.gain.setValueAtTime(15, audioCtx.currentTime);

                // Low-pass filter node configuration
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(160, audioCtx.currentTime);

                engineGain = audioCtx.createGain();
                engineGain.gain.setValueAtTime(0.25, audioCtx.currentTime);

                // Build Node Architecture Graph Pipeline
                engineMod.connect(modGain);
                modGain.connect(engineOsc.frequency);
                engineOsc.connect(filter);
                filter.connect(engineGain);
                engineGain.connect(audioCtx.destination);

                engineOsc.start();
                engineMod.start();
            } catch (err) {
                console.error("Audio Context setup prevented by modern device constraints: ", err);
            }
        }

        function updateEngineAudio(thrusting) {
            if (!engineOsc || !audioCtx) return;
            // Shift engine sound parameters depending on vertical lift input acceleration 
            let targetFreq = thrusting ? 26 : 19;
            let targetGain = thrusting ? 0.38 : 0.22;
            
            engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            engineGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.08);
        }

        function stopEngineAudio() {
            // Absolute shutdown strategy to completely clear background ambient sounds on crash 
            if (engineOsc) {
                try { engineOsc.stop(); engineOsc.disconnect(); } catch(e){}
                engineOsc = null;
            }
            if (engineMod) {
                try { engineMod.stop(); engineMod.disconnect(); } catch(e){}
                engineMod = null;
            }
            if (engineGain) {
                try { engineGain.disconnect(); } catch(e){}
                engineGain = null;
            }
        }

        // Event Input Handlers Architecture
        const activeInputKeys = ['Space', 'ArrowUp', 'KeyW'];

        window.addEventListener('keydown', (e) => {
            if (activeInputKeys.includes(e.code)) {
                e.preventDefault(); // Prevents standard display screen shifting or scrolling 
                if (gameState === 'PLAYING') {
                    isThrusting = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (activeInputKeys.includes(e.code)) {
                isThrusting = false;
            }
        });

        // Pointerdown events safely unify Mouse clicking configurations and Mobile Touch tracking steps
        const handleThrustStart = (e) => {
            e.preventDefault();
            if (gameState === 'PLAYING') {
                isThrusting = true;
            }
        };

        const handleThrustEnd = (e) => {
            e.preventDefault();
            isThrusting = false;
        };

        touchThrust.addEventListener('pointerdown', handleThrustStart);
        touchThrust.addEventListener('pointerup', handleThrustEnd);
        touchThrust.addEventListener('pointercancel', handleThrustEnd);

        // Also permit pressing canvas direct zone to fly forward if buttons missed
        canvas.addEventListener('pointerdown', handleThrustStart);
        canvas.addEventListener('pointerup', handleThrustEnd);

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Core Game Initialization Processes
        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            chopper.y = 200;
            chopper.velocity = 0;
            isThrusting = false;
            obstacles = [];
            obstacleConfig.spawnTimer = 0;
            
            menuOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            
            lastTime = performance.now();
            
            stopEngineAudio();
            startEngineAudio();
            
            requestAnimationFrame(runGameLoop);
        }

        function handleCrashState() {
            gameState = 'GAMEOVER';
            stopEngineAudio(); // Instantly kills any engine buzz tracking logic
            
            if (score > highScore) {
                highScore = score;
            }
            
            scoreSummary.textContent = `Score: ${score} | Best: ${highScore}`;
            gameOverOverlay.classList.remove('hidden');
        }

        // Logic & State Processing (Strict Delta-Time Controlled Execution Loop)
        function updateGameObjects(dt) {
            if (gameState !== 'PLAYING') return;

            // Apply thrust parameters or gravity downward acceleration changes
            if (isThrusting) {
                chopper.velocity += chopper.thrust * dt;
            } else {
                chopper.velocity += chopper.gravity * dt;
            }

            // Cap downward velocities safely
            if (chopper.velocity > chopper.maxFallSpeed) {
                chopper.velocity = chopper.maxFallSpeed;
            }

            chopper.y += chopper.velocity * dt;
            chopper.rotorAngle += (isThrusting ? 35 : 20) * dt; // Rotate blade elements smoothly

            // Dynamic Audio Node processing changes
            updateEngineAudio(isThrusting);

            // Ceiling and Ground Collision Boundaries tracking routines
            if (chopper.y < 0 || chopper.y + chopper.height > canvas.height) {
                handleCrashState();
                return;
            }

            // Generate Obstacle Pillars
            obstacleConfig.spawnTimer += dt;
            if (obstacleConfig.spawnTimer >= obstacleConfig.spawnInterval) {
                obstacleConfig.spawnTimer = 0;
                
                // Randomize heights safely
                const minHeight = 40;
                const maxHeight = canvas.height - obstacleConfig.gap - minHeight;
                const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                
                obstacles.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomY: topHeight + obstacleConfig.gap,
                    passed: false
                });
            }

            // Move Obstacles and Detect Core Boundaries Collisions
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= obstacleConfig.speed * dt;

                // Strip old obstacles safely
                if (obs.x + obstacleConfig.width < 0) {
                    obstacles.splice(i, 1);
                    continue;
                }

                // Check Scoring Points pass lines
                if (!obs.passed && obs.x + obstacleConfig.width / 2 < chopper.x) {
                    obs.passed = true;
                    score++;
                }

                // Collision Box check checks
                if (
                    chopper.x + 6 < obs.x + obstacleConfig.width &&
                    chopper.x + chopper.width - 6 > obs.x &&
                    (chopper.y + 4 < obs.topHeight || chopper.y + chopper.height - 4 > obs.bottomY)
                ) {
                    handleCrashState();
                    return;
                }
            }
        }

        // Canvas Rendering Architecture Subsystem
        function renderGameGraphics() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background Subtle Cyber-Industrial Grid Lines rendering steps
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Obstacle Pillars drawing routines
            obstacles.forEach(obs => {
                ctx.fillStyle = 'linear-gradient(90deg, #1e293b, #0f172a)';
                
                // Neon-accented styling logic configurations
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(0, 240, 255, 0.3)';

                // Draw Top Pillar Frame
                ctx.fillRect(obs.x, 0, obstacleConfig.width, obs.topHeight);
                ctx.strokeRect(obs.x, -2, obstacleConfig.width, obs.topHeight + 2);

                // Draw Bottom Pillar Frame
                ctx.fillRect(obs.x, obs.bottomY, obstacleConfig.width, canvas.height - obs.bottomY);
                ctx.strokeRect(obs.x, obs.bottomY, obstacleConfig.width, canvas.height - obs.bottomY + 2);
            });

            // Draw Chopper Module Entity Elements
            ctx.save();
            ctx.translate(chopper.x, chopper.y);

            // Helicopter Fuselage Base Frame
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(12, 6, 28, 14); 

            // Tail Boom line frame elements
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#94a3b8';
            ctx.beginPath();
            ctx.moveTo(14, 12);
            ctx.lineTo(0, 10);
            ctx.stroke();

            // Small Rear Tail Rotor construct
            ctx.fillStyle = '#64748b';
            ctx.fillRect(-2, 4, 4, 12);

            // Front Cockpit Canopy windshield accent highlights
            ctx.fillStyle = '#00f0ff';
            ctx.fillRect(32, 6, 8, 8);

            // Landing Gear Skids sets
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#475569';
            ctx.beginPath();
            ctx.moveTo(18, 20); ctx.lineTo(18, 23);
            ctx.moveTo(32, 20); ctx.lineTo(32, 23);
            ctx.moveTo(12, 23); ctx.lineTo(36, 23);
            ctx.stroke();

            // Top Rotor Support bracket post
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#475569';
            ctx.beginPath(); ctx.moveTo(26, 6); ctx.lineTo(26, 2); ctx.stroke();

            // Main Spinning Blade Rotor tracking components 
            ctx.translate(26, 2);
            let bladeWidth = Math.sin(chopper.rotorAngle) * 32;
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#f8fafc';
            ctx.beginPath();
            ctx.moveTo(-bladeWidth, 0);
            ctx.lineTo(bladeWidth, 0);
            ctx.stroke();

            ctx.restore();

            // Live HUD Score overlay printing steps
            if (gameState === 'PLAYING') {
                ctx.fillStyle = '#ffffff';
                ctx.font = '700 22px system-ui, sans-serif';
                ctx.fillText(`SCORE: ${score}`, 24, 38);
            }
        }

        // High Frame-Rate Safe Unified Animation Execution Loop
        function runGameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;

            // Calculate precise frame execution interval steps
            let dt = (timestamp - lastTime) / 1000;
            
            // Mitigate game breaks or jumps if backgrounding tabs freeze cycles
            if (dt > 0.1) dt = 0.1; 
            lastTime = timestamp;

            updateGameObjects(dt);
            renderGameGraphics();

            requestAnimationFrame(runGameLoop);
        }

        // Initial setup render execution pass 
        renderGameGraphics();
    </script>
</body>
</html>
